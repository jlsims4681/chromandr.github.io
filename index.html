<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="coi-serviceworker.js"></script>
    <script src="https://cxrtnc.leaningtech.com/1.2.2/cx.js"></script>
    <title>Chromandr.io | Lite Runner</title>
    <style>
        body { margin: 0; background: #0a0a0a; color: #00ff41; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #debug-panel { border: 2px solid #333; padding: 25px; background: #111; width: 85%; max-width: 500px; border-radius: 10px; text-align: center; box-shadow: 0 0 15px rgba(0,255,0,0.1); }
        .status { margin: 12px 0; font-size: 14px; }
        .ok { color: #00ff41; }
        .err { color: #ff4444; }
        #canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: none; background: #000; }
        input { margin: 20px 0; color: #00ff41; }
        button { background: #333; color: white; border: 1px solid #555; padding: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="debug-panel">
        <h1 style="color:white; margin-top:0;">CHROMANDR.IO</h1>
        <div class="status">Headers: <span id="s1">Checking...</span></div>
        <div class="status">Engine: <span id="s2">Checking...</span></div>
        <div class="status">RAM: <span id="s3">Detecting...</span></div>
        <hr style="border:0; border-top:1px solid #333;">
        <div id="ui-area" style="display:none;">
            <p>Select your 32-bit ISO:</p>
            <input type="file" id="isoPicker" accept=".iso">
            <div id="boot-status" style="margin-top:10px; font-weight:bold;"></div>
        </div>
        <button onclick="location.reload(true)">Hard Refresh</button>
    </div>

    <canvas id="canvas"></canvas>

    <script type="module">
        const s1 = document.getElementById('s1');
        const s2 = document.getElementById('s2');
        const s3 = document.getElementById('s3');
        const uiArea = document.getElementById('ui-area');
        const picker = document.getElementById('isoPicker');
        const bootStatus = document.getElementById('boot-status');

        if (window.crossOriginIsolated) { s1.innerText = "[OK]"; s1.className = "ok"; } 
        else { s1.innerText = "[BLOCKED]"; s1.className = "err"; }

        window.onload = () => {
            if (typeof CheerpX !== "undefined") {
                s2.innerText = "[READY]"; s2.className = "ok";
                uiArea.style.display = "block";
            } else { s2.innerText = "[FAILED]"; s2.className = "err"; }
            if (navigator.deviceMemory) s3.innerText = `[${navigator.deviceMemory}GB]`;
        };

        picker.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            bootStatus.innerText = "Connecting to Virtual Disk...";
            bootStatus.style.color = "#ffaa00";
            
            try {
                // STREAMING METHOD: Best for 4GB Chromebooks
                const blobUrl = URL.createObjectURL(file);
                const isoDevice = await CheerpX.HttpBytesDevice.create(blobUrl);

                const cx = await CheerpX.Linux.create({
                    mounts: [
                        { type: "ext2", path: "/", dev: isoDevice },
                        { type: "devs", path: "/dev" }
                    ]
                });

                document.getElementById('debug-panel').style.display = 'none';
                const canvas = document.getElementById('canvas');
                canvas.style.display = 'block';
                cx.setKmsCanvas(canvas);

                bootStatus.innerText = "Booting...";

                await cx.run("/kernel", [
                    "init=/init",
                    "androidboot.selinux=permissive",
                    "androidboot.hardware=android_x86",
                    "xforcevesa", 
                    "SRC=/",
                    "quiet"
                ]);
            } catch (err) {
                bootStatus.innerText = "BOOT ERROR: Try a smaller ISO";
                bootStatus.style.color = "#ff4444";
            }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="coi-serviceworker.js"></script>
    <script src="https://cxrtnc.leaningtech.com/1.2.2/cx.js"></script>
    <title>Chromandr.io | v7.0 Lite</title>
    <style>
        body { margin: 0; background: #000; color: #00ff41; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #ui { border: 1px solid #333; padding: 30px; background: #0a0a0a; text-align: center; width: 400px; border-radius: 12px; }
        #canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: none; background: #000; }
        button { background: #00ff41; color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; }
        .status { font-size: 11px; color: #666; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="ui">
        <h1 style="color:white; margin:0 0 10px 0;">CHROMANDR.IO</h1>
        <div class="status">HEADERS: <span id="h">...</span> | ENGINE: <span id="e">...</span></div>
        
        <p style="font-size:12px; color:#ffaa00;">SYSTEM: 4GB RAM DETECTED</p>
        <input type="file" id="iso" accept=".iso">
        <div id="msg" style="margin-top:15px; font-weight:bold;">READY</div>
        
        <button onclick="location.reload(true)">HARD RESET RAM</button>
    </div>

    <canvas id="canvas"></canvas>

    <script type="module">
        const h = document.getElementById('h'); const e = document.getElementById('e');
        const msg = document.getElementById('msg'); const ui = document.getElementById('ui');

        if (window.crossOriginIsolated) { h.innerText = "OK"; h.style.color = "#00ff41"; }
        window.onload = () => { if (typeof CheerpX !== "undefined") { e.innerText = "READY"; e.style.color = "#00ff41"; } };

        document.getElementById('iso').onchange = async (evt) => {
            const file = evt.target.files[0];
            if (!file) return;

            msg.innerText = "STREAMING ISO TO VIRTUAL RAM...";
            msg.style.color = "#00ff41";
            
            try {
                // NEW: Use DataDevice to avoid the 'Memory Crash'
                const isoDevice = await CheerpX.DataDevice.create(file);

                const cx = await CheerpX.Linux.create({
                    mounts: [
                        { type: "ext2", path: "/", dev: isoDevice },
                        { type: "devs", path: "/dev" }
                    ]
                });

                ui.style.display = 'none';
                const canvas = document.getElementById('canvas');
                canvas.style.display = 'block';
                cx.setKmsCanvas(canvas);

                // Safe flags for school Chromebooks
                await cx.run("/kernel", [
                    "init=/init",
                    "androidboot.hardware=android_x86",
                    "video=-16",
                    "EXTMOD=vesa",
                    "xforcevesa",
                    "quiet"
                ]);
            } catch (err) {
                msg.innerText = "SYSTEM REJECTED FILE: REFRESH TAB";
                msg.style.color = "#ff4444";
            }
        };
    </script>
</body>
</html>

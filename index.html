<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="coi-serviceworker.js"></script>
    
    <script src="https://cxrtnc.leaningtech.com/1.2.2/cx.js"></script>
    
    <title>Chromandr.io | Android Runner</title>
    <style>
        body { margin: 0; background: #0b0b0b; color: #00ff41; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #debug-panel { border: 2px solid #333; padding: 20px; background: #111; width: 80%; max-width: 600px; border-radius: 8px; box-shadow: 0 0 20px rgba(0,255,65,0.2); }
        .status-item { margin: 10px 0; font-size: 14px; }
        .ok { color: #00ff41; font-weight: bold; }
        .wait { color: #ffaa00; }
        .err { color: #ff4444; }
        #canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: none; background: #000; }
        input[type="file"] { background: #222; color: #00ff41; padding: 10px; border: 1px dashed #00ff41; width: 100%; cursor: pointer; margin-top: 15px; }
        button { background: #00ff41; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="debug-panel">
        <h1 style="margin-top:0;">CHROMANDR.IO v2.6</h1>
        
        <div class="status-item" id="s1">Security Headers: <span class="wait">Checking...</span></div>
        <div class="status-item" id="s2">CheerpX Engine: <span class="wait">Checking...</span></div>
        <div class="status-item" id="s3">Memory Status: <span class="wait">Detecting...</span></div>
        
        <hr style="border: 0; border-top: 1px solid #333;">
        
        <div id="main-action" style="display:none;">
            <p>Ready! Select a 32-bit (x86) Android ISO:</p>
            <input type="file" id="isoPicker" accept=".iso">
        </div>
        
        <div id="error-msg" class="err"></div>
        <button onclick="location.reload(true)">Hard Refresh (Ctrl+Shift+R)</button>
    </div>

    <canvas id="canvas"></canvas>

    <script type="module">
        const s1 = document.getElementById('s1');
        const s2 = document.getElementById('s2');
        const s3 = document.getElementById('s3');
        const mainAction = document.getElementById('main-action');
        const picker = document.getElementById('isoPicker');
        const canvas = document.getElementById('canvas');

        // 1. Verify Headers
        if (window.crossOriginIsolated) {
            s1.innerHTML = "Security Headers: <span class='ok'>[ACTIVE]</span>";
        } else {
            s1.innerHTML = "Security Headers: <span class='err'>[BLOCKED] - Need Hard Refresh</span>";
        }

        // 2. Verify Engine
        window.onload = async () => {
            if (typeof CheerpX !== "undefined") {
                s2.innerHTML = "CheerpX Engine: <span class='ok'>[READY]</span>";
                mainAction.style.display = "block";
            } else {
                s2.innerHTML = "CheerpX Engine: <span class='err'>[FAILED]</span>";
            }
            
            // 3. Simple Memory Check
            if (navigator.deviceMemory) {
                s3.innerHTML = `System RAM: <span class='ok'>[${navigator.deviceMemory}GB]</span>`;
            } else {
                s3.innerHTML = "System RAM: <span class='wait'>[UNKNOWN]</span>";
            }
        };

        picker.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('error-msg').innerText = "Initializing Boot...";
            
            try {
                // Check if file is x86_64 (which will fail)
                if (file.name.includes("64")) {
                    alert("Warning: This looks like a 64-bit ISO. CheerpX requires a 32-bit (x86) ISO.");
                }

                const isoDevice = await CheerpX.HttpBytesDevice.create(URL.createObjectURL(file));
                const cx = await CheerpX.Linux.create({
                    mounts: [
                        { type: "ext2", path: "/", dev: isoDevice },
                        { type: "devs", path: "/dev" }
                    ]
                });

                document.getElementById('debug-panel').style.display = 'none';
                canvas.style.display = 'block';
                cx.setKmsCanvas(canvas);

                // Ultimate 2026 Boot Flags for Chromebooks
                await cx.run("/kernel", [
                    "init=/init",
                    "androidboot.selinux=permissive",
                    "androidboot.hardware=android_x86",
                    "xforcevesa", // Standard graphics
                    "nomodeset",  // Backup graphics
                    "vga=788",    // 800x600 mode
                    "SRC=/",
                    "quiet"
                ]);
            } catch (err) {
                document.getElementById('error-msg').innerHTML = "BOOT ERROR: " + err.message;
            }
        };
    </script>
</body>
</html>

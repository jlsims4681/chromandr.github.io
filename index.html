<!DOCTYPE html>
<html>
<head>
    <title>Android 2026 - Master Console</title>
    <style>
        body { 
            background: #000; 
            color: #00d4ff; 
            font-family: 'Courier New', monospace; 
            text-align: center; 
            margin: 0; 
            height: 100vh;
            width: 100vw;
            overflow: hidden; 
        }
        
        #header {
            height: 50px;
            border-bottom: 1px solid #00d4ff;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
        }

        h1 { font-size: 18px; letter-spacing: 3px; margin: 0; }
        
        #emu-wrapper { 
            width: 100%; 
            height: calc(100vh - 50px); 
            display: none; 
            background: #000;
        }
        

        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }

        .btn-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        button { 
            padding: 20px 40px; 
            font-size: 18px; 
            cursor: pointer; 
            background: transparent; 
            color: #00d4ff; 
            border: 2px solid #00d4ff;
            transition: 0.3s;
        }
        button:hover { background: #00d4ff; color: #000; box-shadow: 0 0 20px #00d4ff; }
        
        .status-text { font-size: 12px; opacity: 0.6; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="setup-ui" class="btn-container">
        <h1>[ SYSTEM: ANDROID_X86 ]</h1>
        <button onclick="bootAndroid()">🚀 INITIALIZE IFRAME BOOT</button>
        <div class="status-text">NETWORK: ENCRYPTED // BYPASS: ACTIVE</div>
    </div>

    <div id="active-ui" style="display:none;">
        <div id="header">
            <h1>MODERN_OS // TUNNEL_ACTIVE</h1>
            <button onclick="location.reload()" style="padding: 5px 10px; font-size: 10px; margin-left: 20px;">TERMINATE</button>
        </div>
        <div id="emu-wrapper">
            <iframe id="v86-frame" allowfullscreen></iframe>
        </div>
    </div>

    <script>
      function bootAndroid() {
        const frame = document.getElementById('v86-frame');
        const wrapper = document.getElementById('emu-wrapper');
        const ui = document.getElementById('setup-ui');
        const activeUi = document.getElementById('active-ui');
        
     
        const mem = "2048";
        const vgaMem = "32";
        

        const iso = "https://mirrors.kernel.org/android-x86/Release-9.0/android-x86_64-9.0-r2.iso";
        
        const v86Url = "https://copy.sh/v86/" + 
                       "?autostart=true" + 
                       "&memory_size=" + mem + 
                       "&vga_memory_size=" + vgaMem + 
                       "&cdrom=" + encodeURIComponent(iso);
 
        frame.src = v86Url;
        

        ui.style.display = "none";
        activeUi.style.display = "block";
        wrapper.style.display = "block";
        
        console.log("Master Console: Iframe injected. waiting for server...");
      }
    </script>
</body>
</html>

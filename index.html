<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="coi-serviceworker.js"></script>
    <script src="https://cxrtnc.leaningtech.com/1.2.2/cx.js"></script>
    
    <title>Chromandr.io | v2.6 Stable</title>
    <style>
        body { margin: 0; background: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #debug-panel { border: 2px solid #333; padding: 25px; background: #111; width: 85%; max-width: 500px; border-radius: 10px; text-align: center; }
        .status { margin: 12px 0; font-size: 14px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .ok { color: #00ff41; font-weight: bold; }
        .err { color: #ff4444; }
        .loading { color: #ffaa00; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        #canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: none; background: #000; }
        input[type="file"] { margin: 20px 0; color: #00ff41; border: 1px solid #00ff41; padding: 10px; width: 90%; cursor: pointer; }
        button { background: #00ff41; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="debug-panel">
        <h1 style="color:white; margin-top:0;">CHROMANDR.IO</h1>
        
        <div class="status" id="s1">Security Headers: <span>Checking...</span></div>
        <div class="status" id="s2">VM Engine: <span>Checking...</span></div>
        <div class="status" id="s3">System RAM: <span>Detecting...</span></div>
        
        <div id="ui-area" style="display:none;">
            <p style="color:#888;">Select a 32-bit (x86) Android ISO</p>
            <input type="file" id="isoPicker" accept=".iso">
            <div id="boot-status"></div>
        </div>

        <button onclick="location.reload(true)" style="margin-top:10px; background:#333; color:white;">Hard Refresh</button>
    </div>

    <canvas id="canvas"></canvas>

    <script type="module">
        const s1 = document.getElementById('s1').querySelector('span');
        const s2 = document.getElementById('s2').querySelector('span');
        const s3 = document.getElementById('s3').querySelector('span');
        const uiArea = document.getElementById('ui-area');
        const picker = document.getElementById('isoPicker');
        const bootStatus = document.getElementById('boot-status');

        // 1. Check Security Headers
        if (window.crossOriginIsolated) {
            s1.innerHTML = "[OK]";
            s1.className = "ok";
        } else {
            s1.innerHTML = "[BLOCKED] - Press Hard Refresh";
            s1.className = "err";
        }

        // 2. Check Engine & RAM
        window.onload = () => {
            if (typeof CheerpX !== "undefined") {
                s2.innerHTML = "[READY]";
                s2.className = "ok";
                uiArea.style.display = "block";
            } else {
                s2.innerHTML = "[FAILED]";
                s2.className = "err";
            }
            
            if (navigator.deviceMemory) {
                s3.innerHTML = `[${navigator.deviceMemory}GB]`;
                s3.className = navigator.deviceMemory < 8 ? "err" : "ok";
            }
        };

        picker.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            bootStatus.innerHTML = "<span class='loading'>Reading ISO into Memory...</span>";
            
            try {
                // FIXED: Convert file to ArrayBuffer to prevent 'undefined' crash on 4GB RAM
                const buffer = await file.arrayBuffer();
                const isoDevice = await CheerpX.HttpBytesDevice.create(buffer);

                bootStatus.innerHTML = "<span class='loading'>Booting Virtual Machine...</span>";
                
                const cx = await CheerpX.Linux.create({
                    mounts: [
                        { type: "ext2", path: "/", dev: isoDevice },
                        { type: "devs", path: "/dev" }
                    ]
                });

                document.getElementById('debug-panel').style.display = 'none';
                const canvas = document.getElementById('canvas');
                canvas.style.display = 'block';
                cx.setKmsCanvas(canvas);

                // Android x86 Compatibility Flags
                await cx.run("/kernel", [
                    "init=/init",
                    "androidboot.selinux=permissive",
                    "androidboot.hardware=android_x86",
                    "xforcevesa", 
                    "nomodeset",
                    "SRC=/",
                    "quiet"
                ]);
            } catch (err) {
                bootStatus.innerHTML = `<span class='err'>ERROR: ${err.message || "Out of Memory"}</span>`;
            }
        };
    </script>
</body>
</html>

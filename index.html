<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Android Master Console | GitHub</title>
    <script src="https://copy.sh/v86/build/libv86.js"></script>
    <style>
        body { background: #0d1117; color: #58a6ff; font-family: 'Segoe UI', monospace; text-align: center; margin: 0; }
        #header { padding: 20px; border-bottom: 1px solid #30363d; background: #161b22; }
        #container { margin: 20px auto; max-width: 1024px; }
        #screen_container { background: #000; border: 2px solid #30363d; border-radius: 6px; display: inline-block; }
        canvas { display: block; }
        .controls { margin-top: 15px; background: #161b22; padding: 20px; border-radius: 6px; border: 1px solid #30363d; }
        .status-light { height: 10px; width: 10px; background: #238636; border-radius: 50%; display: inline-block; margin-right: 5px; }
        input[type="file"] { color: #8b949e; }
    </style>
</head>
<body>

    <div id="header">
        <h1 style="margin:0; font-size: 24px;">ANDROID MASTER CONSOLE</h1>
        <div style="font-size: 12px; margin-top: 5px;">
            <span class="status-light"></span> x86 ENGINE READY (400MB RAM)
        </div>
    </div>

    <div id="container">
        <div id="screen_container">
            <div style="white-space: pre; font: 14px monospace; line-height: 14px"></div>
            <canvas id="v86_canvas"></canvas>
        </div>

        <div class="controls">
            <p style="margin-top:0;">SELECT ANDROID ISO (e.g. 358MB File)</p>
            <input type="file" id="iso_input">
        </div>
    </div>

    <script>
        document.getElementById("iso_input").onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // Initialize the emulator with your EXACT specs
            const emulator = new V86Starter({
                // Using the official WASM and BIOS files
                wasm_path: "https://copy.sh/v86/build/v86.wasm",
                bios: { url: "https://copy.sh/v86/bios/seabios.bin" },
                vga_bios: { url: "https://copy.sh/v86/bios/vgabios.bin" },
                
                // YOUR SETTINGS: 400MB RAM, 36MB VRAM
                memory_size: 400 * 1024 * 1024,
                vga_memory_size: 36 * 1024 * 1024,
                
                screen_container: document.getElementById("screen_container"),
                canvas: document.getElementById("v86_canvas"),
                cdrom: { file: file },
                autostart: true,
            });

            console.log("Emulation started with local ISO.");
        };
    </script>
</body>
</html>

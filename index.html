<!DOCTYPE html>
<html>
<head>
    <title>Android 2026 - Native Boot</title>
    <link rel="stylesheet" href="v86.css">
    <script src="build/libv86.js"></script>
    <style>
        body { background: #000; color: #00d4ff; font-family: sans-serif; text-align: center; margin: 0; }
        #screen_container { margin: 20px auto; display: none; }
        canvas { border: 2px solid #00d4ff; }
        button { padding: 20px; font-size: 20px; cursor: pointer; background: #111; color: #00d4ff; border: 1px solid #00d4ff; margin-top: 50px; }
    </style>
</head>
<body>
    <h1>SYSTEM: ANDROID NATIVE</h1>
    
    <button id="boot-btn" onclick="startNativeBoot()">🚀 BYPASS & BOOT ANDROID 4.0</button>

    <div id="screen_container">
        <div style="white-space: pre; font-family: monospace"></div>
        <canvas></canvas>
    </div>

    <script>
      function startNativeBoot() {
        document.getElementById('boot-btn').style.display = "none";
        document.getElementById('screen_container').style.display = "block";

        
        var emulator = new V86Starter({
            wasm_path: "build/v86.wasm",
            memory_size: 2048 * 1024 * 1024, // 2GB (Fixes the /root% error)
            vga_memory_size: 32 * 1024 * 1024, // 32MB Video
            screen_container: document.getElementById("screen_container"),
            bios: { url: "bios/seabios.bin" },
            vga_bios: { url: "bios/vgabios.bin" },
            // Direct Link to the ISO (Bypasses the pick-file menu)
            cdrom: { url: "https://mirrors.kernel.org/android-x86/Release-9.0/android-x86_64-9.0-r2.iso" },
            autostart: true,
        });

        // This makes sure your key presses go into Android
        emulator.focus();
      }
    </script>
</body>
</html>

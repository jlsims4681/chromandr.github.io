<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="coi-serviceworker.js"></script>
    <script src="https://cxrtnc.leaningtech.com/1.2.2/cx.js"></script>
    <title>Chromandr.io | v6.0 Fixed</title>
    <style>
        body { margin: 0; background: #000; color: #00ff41; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #ui { border: 1px solid #333; padding: 30px; background: #0a0a0a; text-align: center; width: 380px; border-radius: 8px; }
        #canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: none; background: #000; }
        button { background: #00ff41; color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; }
        .stat { font-size: 10px; color: #666; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="ui">
        <h2 style="color:white; margin:0;">CHROMANDR.IO</h2>
        <div class="stat">HEADERS: <span id="h">...</span> | ENGINE: <span id="e">...</span></div>
        
        <p style="font-size:12px;">SELECT THE 358MB ISO</p>
        <input type="file" id="iso" accept=".iso">
        <div id="msg" style="margin-top:15px; font-weight:bold; color:#ffaa00;">READY</div>
        
        <button onclick="location.reload(true)">FORCE RAM PURGE</button>
    </div>

    <canvas id="canvas"></canvas>

    <script type="module">
        const h = document.getElementById('h'); const e = document.getElementById('e');
        const msg = document.getElementById('msg'); const ui = document.getElementById('ui');

        if (window.crossOriginIsolated) { h.innerText = "OK"; h.style.color = "#00ff41"; }
        window.onload = () => { if (typeof CheerpX !== "undefined") { e.innerText = "READY"; e.style.color = "#00ff41"; } };

        document.getElementById('iso').onchange = async (evt) => {
            const file = evt.target.files[0];
            if (!file) return;

            // Security check against the 921MB file that caused 'undefined' errors
            if (file.size > 500000000) {
                msg.innerText = "CRITICAL: FILE TOO LARGE (USE 358MB)";
                msg.style.color = "#ff4444";
                return;
            }

            msg.innerText = "MAPPING VIRTUAL DRIVE...";
            
            try {
                // HttpBytesDevice used locally to stream chunks from the file picker
                const blobUrl = URL.createObjectURL(file);
                const isoDevice = await CheerpX.HttpBytesDevice.create(blobUrl);

                const cx = await CheerpX.Linux.create({
                    mounts: [
                        { type: "ext2", path: "/", dev: isoDevice },
                        { type: "devs", path: "/dev" }
                    ],
                    timeout: 120000 // Increased to 2 mins for 4GB stability
                });

                ui.style.display = 'none';
                const canvas = document.getElementById('canvas');
                canvas.style.display = 'block';
                cx.setKmsCanvas(canvas);

                await cx.run("/kernel", [
                    "init=/init",
                    "androidboot.hardware=android_x86",
                    "video=-16",      // Low-RAM graphics mode
                    "EXTMOD=vesa",    // Generic driver
                    "xforcevesa",
                    "quiet"
                ]);
            } catch (err) {
                msg.innerText = "MEMORY CRASH: REFRESH SYSTEM";
                msg.style.color = "#ff4444";
            }
        };
    </script>
</body>
</html>

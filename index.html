<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Official v86 - Start Enabled</title>
    <link rel="stylesheet" href="v86.css">
    <script src="libv86.js"></script>
    <style>
        /* Styling the start button to look official */
        #start_button { 
            background: #28a745; 
            color: white; 
            padding: 5px 15px; 
            border: 1px solid #1e7e34; 
            border-radius: 3px;
            cursor: pointer;
        }
        #start_button:disabled { background: #555; cursor: not-allowed; border: 1px solid #333; }
    </style>
</head>
<body style="background: #000; color: #fff; margin: 0;">

    <div id="boot_options" style="padding: 10px; background: #222; border-bottom: 1px solid #444;">
        <label>1. Select Android ISO: </label>
        <input type="file" id="cd_image">
        
        <button id="start_button" disabled>START EMULATOR</button>
        
        <button id="save_state">Save State</button>
        <button id="restore_state">Load State</button>
        <input type="file" id="restore_state_input" style="display:none">
    </div>

    <div style="display: flex;">
        <div id="screen_container">
            <div style="white-space: pre; font-family: monospace"></div>
            <canvas></canvas>
        </div>

        <div id="stats">
            <div class="stats_inner">
                <div id="speed">Speed: 0 mIPS</div>
                <div id="vga_mode">VGA Mode: Text</div>
                <div id="mouse_enabled">Mouse: No</div>
            </div>
        </div>
    </div>

    <script>
    "use strict";

    var emulator;
    var isoFile;

    // Detects when you pick the ISO
    document.getElementById("cd_image").onchange = function(e) {
        isoFile = e.target.files[0];
        if (isoFile) {
            document.getElementById("start_button").disabled = false;
        }
    };

    // starts the emulator
    document.getElementById("start_button").onclick = function() {
        if (!isoFile) return;

        this.disabled = true; // Prevents double-starting
        this.innerText = "POWERING ON...";

        // Initialize the actual v86 engine
        emulator = new V86Starter({
            wasm_path: "v86.wasm",
            memory_size: 256 * 1024 * 1024,
            vga_memory_size: 8 * 1024 * 1024,
            screen_container: document.getElementById("screen_container"),
            bios: { url: "seabios.bin" },
            vga_bios: { url: "vgabios.bin" },
            cdrom: { buffer: isoFile },
            autostart: true, // This tells the engine to start immediately upon creation
        });

        // Starts the mIPS counter loop
        setInterval(function() {
            if (emulator && emulator.is_running()) {
                document.getElementById("speed").innerText = 
                    "Speed: " + (emulator.get_instruction_counter() / 1000000).toFixed(1) + " mIPS";
            }
        }, 1000);
        
        // Ensure keyboard focus goes to the emulator
        emulator.focus();
    };

    // Save/Load Logic
    document.getElementById("save_state").onclick = function() {
        if(!emulator) return;
        emulator.save_state(function(error, result) {
            var a = document.createElement("a");
            a.download = "v86_android_save.bin";
            a.href = window.URL.createObjectURL(new Blob([result]));
            a.click();
        });
    };

    document.getElementById("restore_state").onclick = function() {
        document.getElementById("restore_state_input").click();
    };

    document.getElementById("restore_state_input").onchange = function(e) {
        var reader = new FileReader();
        reader.onload = function() { emulator.restore_state(reader.result); };
        reader.readAsArrayBuffer(e.target.files[0]);
    };
    </script>
</body>
</html>

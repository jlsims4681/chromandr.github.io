<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="coi-serviceworker.js"></script>
    <script src="https://cxrtnc.leaningtech.com/1.2.2/cx.js"></script>
    <title>Chromandr.io | v4.5</title>
    <style>
        body { margin: 0; background: #000; color: #00ff41; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #ui { border: 1px solid #333; padding: 30px; background: #0a0a0a; text-align: center; border-radius: 12px; width: 400px; }
        #canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: none; background: #000; }
        .ok { color: #00ff41; } .err { color: #ff4444; }
        button { background: #00ff41; color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="ui">
        <h1 style="color:white; margin:0 0 10px 0;">CHROMANDR.IO</h1>
        <div style="font-size:11px; margin-bottom:20px;">
            HEADERS: <span id="h">...</span> | ENGINE: <span id="e">...</span> | RAM: <span id="r">...</span>
        </div>
        
        <p>Select your 358MB Android ISO:</p>
        <input type="file" id="iso" accept=".iso">
        <div id="msg" style="margin: 15px 0; font-weight:bold;">READY</div>
        
        <button onclick="location.reload(true)">HARD REFRESH SYSTEM</button>
    </div>

    <canvas id="canvas"></canvas>

    <script type="module">
        const h = document.getElementById('h'); const e = document.getElementById('e');
        const r = document.getElementById('r'); const msg = document.getElementById('msg');

        if (window.crossOriginIsolated) { h.innerText = "OK"; h.className = "ok"; } 
        else { h.innerText = "WAIT"; h.className = "err"; }

        window.onload = () => {
            if (typeof CheerpX !== "undefined") { e.innerText = "READY"; e.className = "ok"; }
            if (navigator.deviceMemory) r.innerText = navigator.deviceMemory + "GB";
        };

        document.getElementById('iso').onchange = async (evt) => {
            const file = evt.target.files[0];
            if (!file) return;

            msg.innerText = "STARTING VM (PLEASE WAIT 60-120S)...";
            msg.style.color = "#ffaa00";
            
            try {
                const blobUrl = URL.createObjectURL(file);
                const isoDevice = await CheerpX.HttpBytesDevice.create(blobUrl);

                const cx = await CheerpX.Linux.create({
                    mounts: [
                        { type: "ext2", path: "/", dev: isoDevice },
                        { type: "devs", path: "/dev" }
                    ],
                    // FIX: Double the timeout for 4GB RAM devices
                    timeout: 120000 
                });

                document.getElementById('ui').style.display = 'none';
                const canvas = document.getElementById('canvas');
                canvas.style.display = 'block';
                cx.setKmsCanvas(canvas);

                // FIX: Force basic graphics to prevent the freeze
                await cx.run("/kernel", [
                    "init=/init",
                    "androidboot.hardware=android_x86",
                    "video=-16",
                    "EXTMOD=vesa",
                    "xforcevesa",
                    "quiet"
                ]);
            } catch (err) {
                msg.innerText = "BOOT ERROR: " + (err.message || "Connection Lost");
                msg.style.color = "#ff4444";
            }
        };
    </script>
</body>
</html>

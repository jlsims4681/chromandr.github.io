<!DOCTYPE html>
<html>
<head>
    <title>Android (later windows)</title>
    <style>
        body { background: #000; color: #00d4ff; font-family: 'Courier New', monospace; text-align: center; margin: 0; overflow: hidden; }
        #header { height: 50px; border-bottom: 1px solid #00d4ff; display: flex; align-items: center; justify-content: center; background: #111; }
        #emu-wrapper { width: 100vw; height: calc(100vh - 50px); display: none; }
        iframe { width: 100%; height: 100%; border: none; }
        .setup { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        button { padding: 20px 40px; background: transparent; color: #00d4ff; border: 2px solid #00d4ff; cursor: pointer; }
        button:hover { background: #00d4ff; color: #000; }
    </style>
</head>
<body>

    <div id="setup-ui" class="setup">
        <h1>[ SYSTEM: NET_ENABLED_ANDROID ]</h1>
        <button onclick="bootWithNet()">BOOT</button>
        <p style="font-size: 10px; margin-top: 15px;">RELAY: WSS://RELAY.WIDGETRY.ORG</p>
    </div>

    <div id="active-ui" style="display:none;">
        <div id="header">
            <span id="stat">STATUS: CONNECTING TO RELAY...</span>
        </div>
        <div id="emu-wrapper">
            <iframe id="v86-frame" allowfullscreen></iframe>
        </div>
    </div>

    <script>
      function bootWithNet() {
        const frame = document.getElementById('v86-frame');
        const iso = "https://mirrors.kernel.org/android-x86/Release-9.0/android-x86_64-9.0-r2.iso";
        
        const proxy = "wss://relay.widgetry.org/";

        const v86Url = "https://copy.sh/v86/" + 
                       "?autostart=true" + 
                       "&memory_size=2048" + 
                       "&vga_memory_size=32" + 
                       "&networking_proxy=" + encodeURIComponent(proxy) + 
                       "&cdrom=" + encodeURIComponent(iso);
        
        frame.src = v86Url;
        document.getElementById('setup-ui').style.display = "none";
        document.getElementById('active-ui').style.display = "block";
        document.getElementById('emu-wrapper').style.display = "block";
        
        setTimeout(() => {
            document.getElementById('stat').innerText = "STATUS: BYPASS_TUNNEL_OPEN";
        }, 5000);
      }
    </script>
</body>
</html>

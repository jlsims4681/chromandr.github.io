<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="coi-serviceworker.js"></script>
    <script src="https://cxrtnc.leaningtech.com/1.2.2/cx.js"></script>
    <title>Chromandr.io | Cloud Edition</title>
    <style>
        body { margin: 0; background: #000; color: #00ff41; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #ui { border: 1px solid #333; padding: 30px; background: #0a0a0a; text-align: center; width: 350px; }
        #canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: none; background: #000; }
        button { background: #00ff41; color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .stat { font-size: 10px; color: #666; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="ui">
        <h2 style="color:white; margin-top:0;">CHROMANDR.IO</h2>
        <div class="stat">HEADERS: <span id="h">...</span> | ENGINE: <span id="e">...</span></div>
        <p style="font-size: 12px;">CLOUD STREAMING ENABLED</p>
        <button id="bootBtn" style="display:none;">BOOT ANDROID (5.1)</button>
        <div id="msg" style="margin-top:10px; font-weight:bold;">INITIALIZING...</div>
    </div>
    <canvas id="canvas"></canvas>

    <script type="module">
        const h = document.getElementById('h'); const e = document.getElementById('e');
        const msg = document.getElementById('msg'); const bootBtn = document.getElementById('bootBtn');

        if (window.crossOriginIsolated) { h.innerText = "OK"; h.style.color = "#00ff41"; }
        window.onload = () => {
            if (typeof CheerpX !== "undefined") { 
                e.innerText = "READY"; e.style.color = "#00ff41";
                bootBtn.style.display = "block";
                msg.innerText = "READY TO STREAM";
            }
        };

        bootBtn.onclick = async () => {
            msg.innerText = "CONNECTING TO CLOUD ISO...";
            try {
                const isoDevice = await CheerpX.HttpBytesDevice.create("https://bro.biriyomz.com/scramjet/https%3A%2F%2Farchive.org%2Fdownload%2Fandroid-x86-some-releases%2Fandroid-x86-5.1-rc1.iso");

                const cx = await CheerpX.Linux.create({
                    mounts: [
                        { type: "ext2", path: "/", dev: isoDevice },
                        { type: "devs", path: "/dev" }
                    ],
                    timeout: 180000 // 3 Minute Timeout
                });

                document.getElementById('ui').style.display = 'none';
                const canvas = document.getElementById('canvas');
                canvas.style.display = 'block';
                cx.setKmsCanvas(canvas);

                await cx.run("/kernel", ["init=/init", "androidboot.hardware=android_x86", "vga=788", "quiet"]);
            } catch (err) {
                msg.innerText = "RAM FULL: CLOSE OTHER TABS";
                console.error(err);
            }
        };
    </script>
</body>
</html>

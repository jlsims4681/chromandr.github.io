<!DOCTYPE html>
<html>
<head>
    <title>Master Console v14 - Iframe Edition</title>
    <style>
        body { margin: 0; background: #000500; color: #00ff41; font-family: monospace; display: flex; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 250px; border-right: 2px solid #00ff41; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #001100; }
        .btn { background: #000; color: #00ff41; border: 1px solid #00ff41; padding: 10px; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        .btn:hover { background: #00ff41; color: #000; }
        
        #monitor-frame { flex: 1; border: none; } /* The actual iframe */
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>MASTER_CONSOLE</h2>
        <p style="font-size: 10px; opacity: 0.7;">IFRAME ENGINE ACTIVE</p>
        
        <button class="btn" style="color:#ff3e3e; border-color:#ff3e3e; margin-top: auto;" onclick="fireMacro()">
             sim(TYPER)
        </button>
    </div>

    <iframe id="monitor-frame" src="iframe-engine.html"></iframe>

    <script>
        function fireMacro() {
            // Get the iframe window
            const vMFrame = document.getElementById('monitor-frame').contentWindow;
            
            
            vMFrame.postMessage("TRIGGER_REDONE", "*");
            
            console.log("Pinging the iframe to start typing...");
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <script src="coi-serviceworker.js"></script>
    <script src="https://cxrtnc.leaningtech.com/1.2.2/cx.js"></script>
    <title>Chromandr.io | Android Runner</title>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #display { width: 100%; height: 100%; display: none; }
        #ui { text-align: center; border: 1px solid #333; padding: 30px; border-radius: 10px; background: #111; }
        .btn { background: #0f0; color: #000; padding: 10px 20px; border: none; cursor: pointer; font-weight: bold; margin: 10px; }
        #status { color: #888; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="ui">
        <h1>CHROMANDR.IO</h1>
        <p>Select your 32-bit Android ISO</p>
        <input type="file" id="isoPicker" accept=".iso">
        <br>
        <button class="btn" onclick="location.reload(true)">FORCE REFRESH</button>
        <div id="status">Ready.</div>
    </div>

    <canvas id="display"></canvas>

    <script type="module">
        const isoPicker = document.getElementById('isoPicker');
        const status = document.getElementById('status');
        const canvas = document.getElementById('display');

        isoPicker.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            status.innerText = "Initializing Engine...";
            
            try {
                // Initialize CheerpX
                const isoDevice = await CheerpX.HttpBytesDevice.create(URL.createObjectURL(file));
                const cx = await CheerpX.Linux.create({
                    mounts: [
                        { type: "ext2", path: "/", dev: isoDevice },
                        { type: "devs", path: "/dev" }
                    ]
                });

                document.getElementById('ui').style.display = 'none';
                canvas.style.display = 'block';
                cx.setKmsCanvas(canvas);

                status.innerText = "Booting Android...";
                // Critical Android x86 Boot Flags
                await cx.run("/kernel", [
                    "init=/init",
                    "androidboot.selinux=permissive",
                    "androidboot.hardware=android_x86",
                    "xforcevesa",
                    "quiet",
                    "SRC=/"
                ]);

            } catch (err) {
                status.innerText = "Error: " + err.message;
                console.error(err);
            }
        };
    </script>
</body>
</html>

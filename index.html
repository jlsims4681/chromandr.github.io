<!DOCTYPE html>
<html>
<head>
    <title>Master Console v15</title>
    <style>
        body { margin: 0; background: #000500; color: #00ff41; font-family: monospace; display: flex; height: 100vh; }
        #sidebar { width: 280px; border-right: 2px solid #00ff41; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #001100; }
        .btn { background: #000; color: #00ff41; border: 1px solid #00ff41; padding: 10px; cursor: pointer; font-family: inherit; width: 100%; }
        .btn:hover { background: #00ff41; color: #000; }
        input { background: #000; border: 1px solid #004400; color: #00ff41; padding: 5px; width: 100%; box-sizing: border-box; }
        iframe { flex: 1; border: none; background: #000; }
        #status { font-size: 10px; color: red; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h3>CPU_MAIN_CONSOLE</h3>
        <div id="status">● OFFLINE</div>

        <label style="font-size: 10px;">MOUNT_REMOTE_URL</label>
        <input type="text" id="iso-url" placeholder="https://archive.org/...">
        
        <label style="font-size: 10px;">MOUNT_LOCAL_FILE</label>
        <input type="file" id="iso-file">

        <button class="btn" onclick="boot()">▶ EXECUTE_BOOT</button>
        <button class="btn" style="color:#ff3e3e; border-color:#ff3e3e; margin-top:20px;" onclick="runMacro()">☢️ RUN_REDONE</button>
    </div>

    <iframe id="engine" src="iframe-engine.html"></iframe>

    <script>
        const frame = document.getElementById('engine').contentWindow;
function boot() {
    const url = document.getElementById('iso-url').value;
    const fileInput = document.getElementById('iso-file').files[0];

    if (fileInput) {
        // Create a pointer instead of copying the whole file
        const blobUrl = URL.createObjectURL(fileInput);
        frame.postMessage({ type: "BOOT", source: blobUrl }, "*");
        console.log("Local ISO mounted via Blob URL");
    } else if (url) {
        frame.postMessage({ type: "BOOT", source: url }, "*");
    }
}

        function runMacro() {
            frame.postMessage({ type: "MACRO" }, "*");
        }

        window.addEventListener("message", (e) => {
            if (e.data.type === "STATUS") {
                document.getElementById('status').style.color = "#00ff41";
                document.getElementById('status').innerText = "● KERNEL_LIVE";
            }
        });
    </script>
</body>
</html>

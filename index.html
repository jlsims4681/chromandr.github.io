<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Android Master Console | Manual Mode</title>
    <script src="https://copy.sh/v86/build/libv86.js"></script>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        #screen_container { 
            background: #000; 
            border: 2px solid #30363d; 
            margin: 20px auto; 
            display: inline-block;
            min-width: 640px;
            min-height: 400px;
        }
        .setup-box { background: #161b22; padding: 20px; border: 1px solid #30363d; border-radius: 6px; display: inline-block; }
        .btn-start { background: #238636; color: white; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 6px; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>

    <h1>ANDROID MASTER CONSOLE</h1>

    <div class="setup-box">
        <h3>STEP 1: INSERT ISO</h3>
        <input type="file" id="cd_file">
        <p style="font-size: 12px; color: #8b949e;">Manual override: Input your RAM/VRAM settings below</p>
        
        <div style="margin: 10px 0;">
            RAM: <input type="number" id="ram_val" value="400" style="width: 60px;"> MB | 
            VRAM: <input type="number" id="vram_val" value="36" style="width: 50px;"> MB
        </div>

        <button id="boot_btn" class="btn-start">START EMULATION</button>
    </div>

    <div id="screen_container">
        <div style="white-space: pre; font: 14px monospace; line-height: 14px"></div>
        <canvas id="v86_canvas"></canvas>
    </div>

    <script>
        document.getElementById("boot_btn").onclick = function() {
            const fileInput = document.getElementById("cd_file");
            const file = fileInput.files[0];
            
            if (!file) {
                alert("Please select your Android ISO first!");
                return;
            }

            // Grab your manual settings from the boxes
            const userRam = document.getElementById("ram_val").value;
            const userVram = document.getElementById("vram_val").value;

            const emulator = new V86Starter({
                wasm_path: "https://copy.sh/v86/build/v86.wasm",
                memory_size: parseInt(userRam) * 1024 * 1024,
                vga_memory_size: parseInt(userVram) * 1024 * 1024,
                screen_container: document.getElementById("screen_container"),
                canvas: document.getElementById("v86_canvas"),
                bios: { url: "https://copy.sh/v86/bios/seabios.bin" },
                vga_bios: { url: "https://copy.sh/v86/bios/vgabios.bin" },
                cdrom: { file: file },
                autostart: true,
            });

            // Hide the setup box once running to save screen space
            document.querySelector(".setup-box").style.opacity = "0.5";
            this.innerText = "SYSTEM RUNNING";
            this.disabled = true;
        };
    </script>
</body>
</html>

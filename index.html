<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="coi-serviceworker.js"></script>
    <script src="https://cxrtnc.leaningtech.com/1.2.2/cx.js"></script>
    <title>Chromandr.io | Stable</title>
    <style>
        body { margin: 0; background: #000; color: #00ff41; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #ui { border: 1px solid #333; padding: 30px; background: #111; text-align: center; border-radius: 8px; width: 400px; }
        .status { font-size: 12px; margin-bottom: 20px; color: #888; }
        #canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: none; background: #000; }
        button { background: #00ff41; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; margin-top: 20px; width: 100%; }
        input { margin: 20px 0; font-size: 12px; }
    </style>
</head>
<body>

    <div id="ui">
        <h2 style="color:white; margin-top:0;">CHROMANDR.IO</h2>
        <div class="status">
            Headers: <span id="h">[...]</span> | Engine: <span id="e">[...]</span>
        </div>
        
        <p>Select your 358MB Android ISO:</p>
        <input type="file" id="iso" accept=".iso">
        
        <div id="msg" style="font-weight:bold; color:#ffaa00;"></div>
        
        <button onclick="location.reload(true)">HARD REFRESH</button>
    </div>

    <canvas id="canvas"></canvas>

    <script type="module">
        const h = document.getElementById('h'); const e = document.getElementById('e');
        const ui = document.getElementById('ui'); const msg = document.getElementById('msg');
        const canvas = document.getElementById('canvas');

        // Check if security headers are active
        if (window.crossOriginIsolated) { h.innerText = "OK"; h.style.color = "#00ff41"; }
        else { h.innerText = "WAIT"; h.style.color = "#ff4444"; }

        window.onload = () => {
            if (typeof CheerpX !== "undefined") { e.innerText = "READY"; e.style.color = "#00ff41"; }
        };

        document.getElementById('iso').onchange = async (evt) => {
            const file = evt.target.files[0];
            if (!file) return;

            msg.innerText = "INITIALIZING VM...";
            
            try {
                // Streaming method to save your 4GB RAM
                const blobUrl = URL.createObjectURL(file);
                const isoDevice = await CheerpX.HttpBytesDevice.create(blobUrl);

                const cx = await CheerpX.Linux.create({
                    mounts: [
                        { type: "ext2", path: "/", dev: isoDevice },
                        { type: "devs", path: "/dev" }
                    ]
                });

                ui.style.display = 'none';
                canvas.style.display = 'block';
                cx.setKmsCanvas(canvas);

                // Most stable boot flags for legacy Android
                await cx.run("/kernel", [
                    "init=/init",
                    "androidboot.hardware=android_x86",
                    "xforcevesa",
                    "vga=788",
                    "quiet"
                ]);
            } catch (err) {
                msg.innerText = "BOOT ERROR: " + (err.message || "Timeout");
                msg.style.color = "#ff4444";
            }
        };
    </script>
</body>
</html>

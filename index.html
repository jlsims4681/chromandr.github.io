<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="coi-serviceworker.js"></script>
    <script src="https://cxrtnc.leaningtech.com/1.2.2/cx.js"></script>
    <title>Chromandr.io | v4.2 Stable</title>
    <style>
        body { margin: 0; background: #000; color: #00ff41; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #ui { border: 1px solid #333; padding: 30px; background: #0a0a0a; text-align: center; border-radius: 12px; width: 420px; box-shadow: 0 0 30px rgba(0, 255, 0, 0.05); }
        .diagnostics { font-size: 11px; margin-bottom: 20px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        #canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: none; background: #000; }
        .ok { color: #00ff41; }
        .wait { color: #ffaa00; }
        .err { color: #ff4444; }
        input[type="file"] { margin: 20px 0; font-size: 12px; border: 1px dashed #444; padding: 10px; width: 80%; cursor: pointer; }
        button { background: #00ff41; color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; width: 100%; border-radius: 4px; transition: 0.2s; }
        button:hover { background: #00cc33; }
    </style>
</head>
<body>

    <div id="ui">
        <h1 style="color:white; margin:0 0 5px 0; letter-spacing: -1px;">CHROMANDR.IO</h1>
        <div class="diagnostics">
            Headers: <span id="h">...</span> | Engine: <span id="e">...</span> | RAM: <span id="r">...</span>
        </div>
        
        <p style="font-size: 13px; color: #ccc;">Select your 358MB Android ISO</p>
        <input type="file" id="iso" accept=".iso">
        
        <div id="status-msg" style="font-weight:bold; margin-bottom: 15px; min-height: 1.2em;">READY</div>
        
        <button onclick="location.reload(true)">HARD REFRESH SYSTEM</button>
    </div>

    <canvas id="canvas"></canvas>

    <script type="module">
        const h = document.getElementById('h'); 
        const e = document.getElementById('e');
        const r = document.getElementById('r');
        const ui = document.getElementById('ui'); 
        const status = document.getElementById('status-msg');
        const canvas = document.getElementById('canvas');

        // Verify Environment
        if (window.crossOriginIsolated) { 
            h.innerText = "OK"; h.className = "ok"; 
        } else { 
            h.innerText = "WAIT"; h.className = "err"; 
        }

        window.onload = () => {
            if (typeof CheerpX !== "undefined") { 
                e.innerText = "READY"; e.className = "ok"; 
            } else {
                e.innerText = "FAIL"; e.className = "err";
            }
            if (navigator.deviceMemory) {
                r.innerText = navigator.deviceMemory + "GB";
                r.className = navigator.deviceMemory < 8 ? "wait" : "ok";
            }
        };

        document.getElementById('iso').onchange = async (evt) => {
            const file = evt.target.files[0];
            if (!file) return;

            // Diagnostic: Ensure it's not the 921MB file that crashed you before
            if (file.size > 500000000) {
                status.innerText = "FILE TOO LARGE (USE 358MB)";
                status.className = "err";
                return;
            }

            status.innerText = "BOOTING VM (WAIT 60S)...";
            status.className = "wait";
            
            try {
                // Streaming method avoids "Out of Memory" errors
                const blobUrl = URL.createObjectURL(file);
                const isoDevice = await CheerpX.HttpBytesDevice.create(blobUrl);

                const cx = await CheerpX.Linux.create({
                    mounts: [
                        { type: "ext2", path: "/", dev: isoDevice },
                        { type: "devs", path: "/dev" }
                    ],
                    // Fixed: Extended timeout to 60 seconds for 4GB RAM devices
                    timeout: 60000 
                });

                ui.style.display = 'none';
                canvas.style.display = 'block';
                cx.setKmsCanvas(canvas);

                // Safe Graphics Flags for ChromeOS
                await cx.run("/kernel", [
                    "init=/init",
                    "androidboot.hardware=android_x86",
                    "xforcevesa",
                    "vga=788",
                    "quiet"
                ]);
            } catch (err) {
                status.innerText = "BOOT ERROR: " + (err.message || "Timeout");
                status.className = "err";
            }
        };
    </script>
</body>
</html>

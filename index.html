<!DOCTYPE html>
<html>
<head>
    <title>Android 2026 - Master Console</title>
    <style>
        /* This matches the look of your original GAS console */
        body { background: #000; color: #00d4ff; font-family: 'Courier New', monospace; text-align: center; margin: 0; overflow: hidden; }
        h1 { letter-spacing: 5px; text-shadow: 0 0 10px #00d4ff; padding-top: 20px; }
        
        #emu-wrapper { 
            width: 95%; 
            height: 85vh; 
            margin: 10px auto; 
            display: none; 
            border: 2px solid #00d4ff; 
            box-shadow: 0 0 15px #00d4ff; 
        }
        
        iframe { width: 100%; height: 100%; border: none; }

        button { 
            margin-top: 100px;
            padding: 25px 50px; 
            font-size: 22px; 
            cursor: pointer; 
            background: #000; 
            color: #00d4ff; 
            border: 2px solid #00d4ff;
            box-shadow: 0 0 10px #00d4ff;
        }
        button:hover { background: #00d4ff; color: #000; }
    </style>
</head>
<body>

    <div id="setup-ui">
        <h1>SYSTEM: ANDROID 9.0</h1>
        <button onclick="bootV86()">🚀 BYPASS & BOOT ANDROID</button>
    </div>

    <div id="emu-wrapper">
        <iframe id="v86-frame" src=""></iframe>
    </div>

    <script>
      function bootV86() {
        const frame = document.getElementById('v86-frame');
        const wrapper = document.getElementById('emu-wrapper');
        const ui = document.getElementById('setup-ui');
        
        // The High-Speed Android 9 ISO
        const iso = "https://mirrors.kernel.org/android-x86/Release-9.0/android-x86_64-9.0-r2.iso";
        
        // The v86 URL Construction
        // memory_size=2048: Necessary for Android 9 to load the system image
        // vga_memory_size=32: Enables the graphical buffer
        const v86Url = "https://copy.sh/v86/" + 
                       "?autostart=true" + 
                       "&memory_size=2048" + 
                       "&vga_memory_size=32" + 
                       "&cdrom=" + encodeURIComponent(iso);
        
        frame.src = v86Url;
        ui.style.display = "none";
        wrapper.style.display = "block";
      }
    </script>
</body>
</html>

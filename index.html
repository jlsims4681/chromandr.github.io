<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="coi-serviceworker.js"></script>
    <script src="https://cxrtnc.leaningtech.com/1.2.2/cx.js"></script>
    <title>Chromandr.io | Terminal Mode</title>
    <style>
        body { margin: 0; background: #000; color: #00ff41; font-family: monospace; }
        #console { width: 100vw; height: 100vh; overflow: hidden; display: none; }
        #ui { padding: 40px; text-align: center; }
        button { background: #00ff41; color: #000; border: none; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="ui">
        <h2>TERMINAL RESCUE MODE</h2>
        <p>This skips graphics to save RAM. Select your 358MB ISO:</p>
        <input type="file" id="iso">
        <div id="msg">READY</div>
    </div>
    <div id="console"></div>

    <script type="module">
        const msg = document.getElementById('msg');
        const ui = document.getElementById('ui');
        const consoleDiv = document.getElementById('console');

        document.getElementById('iso').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            msg.innerText = "BOOTING KERNEL...";
            try {
                const isoDevice = await CheerpX.DataDevice.create(file);
                const cx = await CheerpX.Linux.create({
                    mounts: [{ type: "ext2", path: "/", dev: isoDevice }, { type: "devs", path: "/dev" }]
                });

                ui.style.display = 'none';
                consoleDiv.style.display = 'block';
                
                // Use a text terminal instead of a graphics canvas
                cx.setTerminal(consoleDiv);

                await cx.run("/kernel", [
                    "init=/bin/sh", // Boot directly into a command shell
                    "androidboot.hardware=android_x86",
                    "quiet"
                ]);
            } catch (err) {
                msg.innerText = "RAM EXHAUSTED";
            }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <script src="coi-serviceworker.js"></script>
    <script src="https://cxrtnc.leaningtech.com/1.2.2/cx.js"></script>
    <title>Chromandr.io | Debug Mode</title>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: monospace; padding: 20px; }
        #status-box { border: 2px solid #333; padding: 20px; background: #111; max-width: 600px; margin: auto; }
        .error-text { color: #ff4444; font-weight: bold; }
        .success-text { color: #44ff44; }
        #canvas { width: 100vw; height: 100vh; display: none; position: absolute; top: 0; left: 0; }
        input { margin-top: 20px; color: white; }
    </style>
</head>
<body>

    <div id="status-box">
        <h1>System Diagnostics</h1>
        <div id="check1">Checking Security Headers... </div>
        <div id="check2">Checking CheerpX Engine... </div>
        <hr>
        <div id="main-status">Waiting for system check...</div>
        <input type="file" id="isoPicker" accept=".iso" style="display:none;">
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const s1 = document.getElementById('check1');
        const s2 = document.getElementById('check2');
        const main = document.getElementById('main-status');
        const picker = document.getElementById('isoPicker');

        // 1. Check if the Security Hack worked
        if (window.crossOriginIsolated) {
            s1.innerHTML += "<span class='success-text'>[OK]</span>";
        } else {
            s1.innerHTML += "<span class='error-text'>[BLOCKED] - Press Ctrl+Shift+R</span>";
        }

        // 2. Check if CheerpX loaded
        window.onload = () => {
            if (typeof CheerpX !== "undefined") {
                s2.innerHTML += "<span class='success-text'>[LOADED]</span>";
                main.innerText = "Ready! Please select your 32-bit ISO.";
                picker.style.display = "block";
            } else {
                s2.innerHTML += "<span class='error-text'>[FAILED]</span>";
                main.innerText = "The engine is missing. Check your internet or GitHub files.";
            }
        };

        picker.onchange = async (e) => {
            const file = e.target.files[0];
            try {
                main.innerText = "Booting " + file.name + "...";
                const isoDevice = await CheerpX.HttpBytesDevice.create(URL.createObjectURL(file));
                const cx = await CheerpX.Linux.create({
                    mounts: [{ type: "ext2", path: "/", dev: isoDevice }, { type: "devs", path: "/dev" }]
                });
                document.getElementById('status-box').style.display = 'none';
                const canvas = document.getElementById('canvas');
                canvas.style.display = 'block';
                cx.setKmsCanvas(canvas);
                await cx.run("/kernel", ["init=/init", "xforcevesa", "quiet", "SRC=/"]);
            } catch (err) {
                main.innerHTML = "<span class='error-text'>BOOT ERROR: " + err.message + "</span>";
            }
        };
    </script>
</body>
</html>

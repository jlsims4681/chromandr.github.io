<!DOCTYPE html>
<html>
<head>
    <title>Master Console v10.0</title>
    <style>
        body { margin: 0; background: #000; color: #00d4ff; font-family: 'Courier New', monospace; overflow: hidden; }
        #desktop { width: 100vw; height: 100vh; display: flex; }
        
        /* Sidebar Navigation */
        #sidebar { 
            width: 280px; background: #050505; border-right: 1px solid #00d4ff; 
            padding: 20px; display: flex; flex-direction: column; gap: 15px; 
            box-shadow: 5px 0 15px rgba(0, 212, 255, 0.1); z-index: 10;
        }

        .section-label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        
        /* Inputs */
        input[type="text"], .file-input-wrapper { 
            background: #000; border: 1px solid #00d4ff; color: #00d4ff; 
            padding: 8px; font-family: inherit; font-size: 11px; width: 100%; box-sizing: border-box;
        }
        
        .btn { 
            background: #001b22; border: 1px solid #00d4ff; color: #00d4ff; 
            padding: 10px; cursor: pointer; font-size: 11px; transition: 0.3s;
        }
        .btn:hover { background: #00d4ff; color: #000; box-shadow: 0 0 10px #00d4ff; }
        .btn-reset { border-color: #ff5f56; color: #ff5f56; margin-top: auto; }

        /* Main Display */
        #main-view { flex-grow: 1; display: flex; flex-direction: column; background: #000; }
        #v86_container { flex-grow: 1; width: 100%; height: 100%; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        
        #status-bar { height: 25px; background: #001b22; font-size: 10px; display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

<div id="desktop">
    <div id="sidebar">
        <h2 style="font-size: 16px; margin: 0 0 10px 0;">MASTER_CONSOLE</h2>
        
        <div class="section-label">Source Selection</div>
        
        <input type="text" id="iso-url" placeholder="Enter ISO URL (e.g. Archive.org)">
        
        <div style="text-align:center; font-size: 10px; color:#444;">- OR -</div>
        
        <button class="btn" onclick="document.getElementById('local-iso').click()">📂 SELECT LOCAL ISO</button>
        <input type="file" id="local-iso" style="display:none" onchange="updateFileInfo(this)">
        <div id="file-name" style="font-size: 9px; color: #888; overflow: hidden;">No file selected</div>

        <button class="btn" style="background: #003300;" onclick="bootSystem()">▶ START EMULATOR</button>

        <div class="section-label">State Management</div>
        <button class="btn" onclick="downloadState()">💾 SAVE SNAPSHOT (.bin)</button>
        <button class="btn" onclick="document.getElementById('upload-state').click()">📂 LOAD SNAPSHOT</button>
        <input type="file" id="upload-state" style="display:none" onchange="restoreState(this)">

        <div class="section-label">Display</div>
        <button class="btn" onclick="goFullscreen()">📺 FULLSCREEN</button>
        <button class="btn" onclick="window.dispatchEvent(new Event('resize'))">📐 FIX RATIO</button>

        <button class="btn btn-reset" onclick="triggerRedone()">☢️ REDONE (RECOVERY)</button>
    </div>

    <div id="main-view">
        <div id="status-bar">STATUS: <span id="log" style="margin-left:5px; color:#00d4ff;">IDLE</span></div>
        <div id="v86_container"></div>
    </div>
</div>

<script src="https://unpkg.com/v86@0.5.44/build/libv86.js"></script>

<script>
    let emulator = null;
    let selectedFile = null;

    function updateFileInfo(input) {
        if (input.files[0]) {
            selectedFile = input.files[0];
            document.getElementById('file-name').innerText = "SELECTED: " + selectedFile.name;
            document.getElementById('iso-url').value = ""; // Clear URL if file is picked
        }
    }

    function bootSystem() {
        const urlInput = document.getElementById('iso-url').value;
        const container = document.getElementById('v86_container');
        
        const config = {
            wasm_path: "https://unpkg.com/v86@0.5.44/build/v86.wasm",
            memory_size: 800 * 1024 * 1024,
            vga_memory_size: 16 * 1024 * 1024,
            screen_container: container,
            bios: { url: "https://unpkg.com/v86@0.5.44/bios/seabios.bin" },
            vga_bios: { url: "https://unpkg.com/v86@0.5.44/bios/vgabios.bin" },
            network_relay_url: "wss://relay.bemmu.com/",
            net_device: "ne2k_pci",
            autostart: true,
        };

        // Decide source
        if (selectedFile) {
            config.cdrom = { buffer: null }; // We'll load the buffer
            const reader = new FileReader();
            reader.onload = function(e) {
                config.cdrom.buffer = e.target.result;
                startV86(config);
            };
            reader.readAsArrayBuffer(selectedFile);
        } else if (urlInput) {
            config.cdrom = { url: urlInput };
            startV86(config);
        } else {
            alert("Provide an ISO link or select a file first!");
        }
    }

    function startV86(config) {
        if (emulator) emulator.destroy();
        emulator = new V86Starter(config);
        document.getElementById('log').innerText = "BOOTING_KERNEL...";
        window.lastEmu = emulator;
    }

    async function downloadState() {
        if (!emulator) return;
        const state = await emulator.save_state();
        const a = document.createElement("a");
        a.href = window.URL.createObjectURL(new Blob([state]));
        a.download = "android_backup.bin";
        a.click();
    }

    function restoreState(input) {
        if (!emulator || !input.files[0]) return;
        const reader = new FileReader();
        reader.onload = (e) => emulator.restore_state(e.target.result);
        reader.readAsArrayBuffer(input.files[0]);
    }

    function triggerRedone() {
        if (!emulator) return;
        // Optimized Bash sequence for lock removal
        const cmd = "su\nmount -o remount,rw /data\nrm /data/system/*.key\nsync\n";
        for (let i = 0; i < cmd.length; i++) emulator.serial0_send(cmd.charCodeAt(i));
        document.getElementById('log').innerText = "OPTIMIZATION_SENT";
    }

    function goFullscreen() {
        const el = document.getElementById('main-view');
        if (el.requestFullscreen) el.requestFullscreen();
        else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    }
</script>
</body>
</html>

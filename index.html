<!doctype html>
<html>
<head>
    <title>Android v86 - Direct Load</title>
    <script src="v86-engine/libv86.js"></script>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        #screen_container { margin: 20px auto; border: 3px solid #444; display: inline-block; background: #000; }
        .load-panel { background: #222; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #333; }
        input { margin: 10px; padding: 5px; }
    </style>
</head>
<body>

    <div class="load-panel">
        <h3>Step 1: Load your Android ISO</h3>
        <input type="file" id="iso_selector" accept=".iso">
        
        <p style="font-size: 12px; color: #888;">(Optional: Load a Save State .bin file after starting)</p>
        <input type="file" id="state_selector" accept=".bin">
    </div>

    <div id="screen_container">
        <div style="white-space: pre; font-family: monospace"></div>
        <canvas style="display: none"></canvas>
    </div>

    <script>
        var emulator;

        // --- LOADING THE ISO ---
        document.getElementById("iso_selector").onchange = function(e) {
            var file = e.target.files[0];
            if (!file) return;

            emulator = new V86Starter({
                wasm_path: "v86-engine/v86.wasm",
                memory_size: 256 * 1024 * 1024,
                vga_memory_size: 8 * 1024 * 1024,
                screen_container: document.getElementById("screen_container"),
                bios: { url: "v86-engine/seabios.bin" },
                vga_bios: { url: "v86-engine/vgabios.bin" },
                cdrom: { buffer: file }, // This loads the file you picked
                autostart: true,
            });

            // Focus fix: Clicking the screen makes it active
            window.onclick = function() { emulator.focus(); };
        };

        // --- LOADING A SAVE STATE (.bin) ---
        document.getElementById("state_selector").onchange = function(e) {
            var file = e.target.files[0];
            if (!file || !emulator) return;

            var reader = new FileReader();
            reader.onload = function() {
                emulator.restore_state(reader.result);
                console.log("State loaded!");
            };
            reader.readAsArrayBuffer(file);
        };
    </script>
</body>
</html>
